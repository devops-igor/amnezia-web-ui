name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Check black formatting
        run: |
          black --check --diff .

      - name: Run flake8
        run: |
          flake8 . --max-line-length=100 --extend-ignore=E203,W503,E501,E722,F841,F824 --exclude=.venv