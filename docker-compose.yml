version: '3.8'

services:
  amnezia_panel:
    image: ghcr.io/devops-igor/amnezia-web-ui:latest
    container_name: amnezia_panel
    # To connect the (Traefik) balancer, assign one network to both containers and uncomment the labels by replacing the domain with your own.
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.amnezia_panel.entrypoints=web,websecure
    #   - traefik.http.routers.amnezia_panel.rule=Host(`amnezia.domain`)
    #   - traefik.http.services.amnezia_panel.loadbalancer.server.port=5000
    ports:
      - "${APP_PORT:-5000}:5000"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      # Mount for persistent data storage across container restarts
      - ./data:/app/data
    environment:
      # SECRET_KEY should be set in production! Generate with:
      # python -c "import secrets; print(secrets.token_hex(32))"
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      # Trusted reverse proxy IPs/CIDRs for X-Forwarded-For header validation.
      # Supports CIDR notation (e.g. 172.18.0.0/24) and plain IPs.
      # Use CIDR for Docker networks to survive container IP changes.
      - TRUSTED_PROXIES=172.18.0.0/24
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.connect(('localhost', 5000)); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s