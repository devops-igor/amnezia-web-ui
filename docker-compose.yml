version: '3.8'

services:
  amnezia_panel:
    image: ghcr.io/devops-igor/amnezia-web-ui:latest
    container_name: amnezia_panel
    # To connect the (Traefik) balancer, assign one network to both containers and uncomment the labels by replacing the domain with your own.
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.amnezia_panel.entrypoints=web,websecure
    #   - traefik.http.routers.amnezia_panel.rule=Host(`amnezia.domain`)
    #   - traefik.http.services.amnezia_panel.loadbalancer.server.port=5000
    ports:
      - "${APP_PORT:-5000}:5000"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      # Mount for persistent data storage across container restarts
      - ./data:/app/data
    environment:
      # Required! Generate with: python -c "import secrets; print(secrets.token_hex(32))"
      # Store in .env file: echo "SECRET_KEY=$(python3 -c 'import secrets; print(secrets.token_hex(32))')" > .env
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      # Set TRUSTED_PROXIES to the IP of your reverse proxy (e.g., Traefik, nginx).
      # Multiple entries comma-separated. Leave empty to ignore X-Forwarded-For.
      # - TRUSTED_PROXIES=172.16.0.1,172.16.0.2
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.connect(('localhost', 5000)); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s