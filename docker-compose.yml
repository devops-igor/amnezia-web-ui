# Amnezia Web Panel — Production Docker Compose
#
# Usage:
#   Standalone (panel only, port 5000):
#     docker compose up -d
#
#   With BunkerWeb WAF (port 80/443):
#     docker compose --profile bunkerweb up -d
#
#   With Telemt metrics (port 18443):
#     docker compose --profile telemt up -d
#
#   All profiles combined:
#     docker compose --profile bunkerweb --profile telemt up -d
#
# Environment: copy .env.example to .env and fill in values.

services:

  # ---------------------------------------------------------------------------
  # Amnezia Web Panel
  # ---------------------------------------------------------------------------
  amnezia-panel:
    image: ${AMNEZIA_IMAGE:-ghcr.io/devops-igor/amnezia-web-ui:latest}
    container_name: amnezia-panel
    # Expose panel port directly. Set APP_PORT= (empty) in .env when using
    # BunkerWeb to skip direct port exposure — BunkerWeb routes traffic instead.
    # NOTE: Docker treats APP_PORT= as a random ephemeral host port (:5000),
    # not "no port". To fully block direct access, use firewall rules or rely
    # on BunkerWeb as the sole entry point.
    ports:
      - "${APP_PORT:-5000}:5000"
    restart: unless-stopped
    user: "100:101"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ${DATA_DIR:-./data}:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - TRUSTED_PROXIES=${TRUSTED_PROXIES:-172.18.0.0/24}
      - DATA_DIR=/app/data
    networks:
      - bw-net
    # NOTE: No depends_on for bunkerweb here. When running with --profile bunkerweb,
    # BunkerWeb discovers the panel via AUTOCONF_MODE and labels. Start order doesn't
    # matter — BunkerWeb retries the backend until it's healthy. Without the profile,
    # depends_on would break standalone mode.
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 100m
    healthcheck:
      # python socket.connect('localhost') fails inside read_only containers.
      # Use pidof instead — lightweight and works in minimal Alpine images.
      test: ["CMD-SHELL", "pidof python > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - bunkerweb.SERVER_NAME=${PANEL_DOMAIN:-localhost}
      - bunkerweb.USE_REVERSE_PROXY=yes
      - bunkerweb.REVERSE_PROXY_URL=/
      - bunkerweb.REVERSE_PROXY_HOST=http://amnezia-panel:5000
      - bunkerweb.REVERSE_PROXY_INTERCEPT_ERRORS=no
      - bunkerweb.USE_BAD_BEHAVIOR=${USE_BAD_BEHAVIOR:-yes}
      - bunkerweb.USE_LIMIT_REQ=${USE_LIMIT_REQ:-yes}
      - bunkerweb.USE_LIMIT_CONN=${USE_LIMIT_CONN:-yes}

  # ---------------------------------------------------------------------------
  # BunkerWeb WAF (Web Application Firewall)
  # https://www.bunkerweb.io/
  # ---------------------------------------------------------------------------
  bunkerweb:
    image: bunkerity/bunkerweb-all-in-one:${BUNKERWEB_VERSION:-1.6.9}
    container_name: bunkerweb
    profiles:
      - bunkerweb
    environment:
      # Docker integration — BunkerWeb auto-configures from labels
      - AUTOCONF_MODE=yes

      # NOTE: Multi-site domain routing is configured via env vars.
      # See .env.example for PANEL_DOMAIN, BUNKERWEB_UI_DOMAIN, BUNKERWEB_UI_PORT.
      # When BUNKERWEB_UI_DOMAIN is empty, the UI is only accessible via the
      # localhost port mapping below (SSH tunnel).

      - DOCKER_HOST=tcp://docker-proxy:2375

      # Multi-site support — per-site routing set below via env vars
      - MULTISITE=${MULTISITE:-yes}
      - SERVER_NAME=${PANEL_DOMAIN:-localhost} ${BUNKERWEB_UI_DOMAIN:-}

      # Per-site routing: BunkerWeb UI domain → internal BunkerWeb UI (port 7000)
      # When BUNKERWEB_UI_DOMAIN is set (e.g. dev.example.com), these create per-site
      # entries that route traffic to the BunkerWeb admin interface.
      # When empty, they resolve to harmless no-ops (BunkerWeb ignores empty prefixes).
      - ${BUNKERWEB_UI_DOMAIN:-}_USE_REVERSE_PROXY=yes
      - ${BUNKERWEB_UI_DOMAIN:-}_REVERSE_PROXY_URL=/
      - ${BUNKERWEB_UI_DOMAIN:-}_REVERSE_PROXY_HOST=http://127.0.0.1:7000
      - ${BUNKERWEB_UI_DOMAIN:-}_REVERSE_PROXY_INTERCEPT_ERRORS=no

      # Let's Encrypt
      - AUTO_LETS_ENCRYPT=${AUTO_LETS_ENCRYPT:-yes}
      - EMAIL_LETS_ENCRYPT=${EMAIL_LETS_ENCRYPT:?Email required for Let's Encrypt}
      - USE_GZIP=${USE_GZIP:-yes}

      # UI and security defaults
      - USE_UI=${USE_UI:-yes}
      - USE_MODSECURITY=${USE_MODSECURITY:-yes}

      # Whitelisting — global default is off; per-site overrides below
      - USE_WHITELIST_IP=no
      - WHITELIST_IP_LIST=${WHITELIST_IP_LIST:-}
      # Per-site whitelist for the panel domain (overrides global default).
      # ${PANEL_DOMAIN}_ prefix targets only the panel site in multisite mode.
      - ${PANEL_DOMAIN:-}_USE_WHITELIST_IP=${USE_WHITELIST_IP:-no}
      - ${PANEL_DOMAIN:-}_WHITELIST_IP_LIST=${WHITELIST_IP_LIST:-}

      # Rate limiting — can be tightened per-site via LIMIT_REQ_* vars
      - USE_LIMIT_REQ=no
      - USE_LIMIT_CONN=no
      - USE_BAD_BEHAVIOR=no
      - USE_DNSBL=no
      - USE_ANTIBOT=no

      # CrowdSec — enable by setting USE_CROWDSEC=yes
      - USE_CROWDSEC=${USE_CROWDSEC:-no}

      # Allowed HTTP methods — PATCH needed for speed-limit API, DELETE for future use
      - ALLOWED_METHODS=GET|POST|HEAD|PATCH|DELETE

      # Skip WAF rules for ACME challenge endpoints
      - SKIP_WAF_RULES=/.well-known/acme-challenge/

    networks:
      - bw-net
    ports:
      - "80:8080/tcp"
      - "443:8443/tcp"
      - "443:8443/udp"
      - "${BUNKERWEB_UI_PORT:-127.0.0.1:7080}:7000"
    volumes:
      - bw-data:/data
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 100m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Docker Socket Proxy — restricts Docker API access for BunkerWeb
  # https://github.com/Tecnativa/docker-socket-proxy
  # ---------------------------------------------------------------------------
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-proxy
    profiles:
      - bunkerweb
    environment:
      - CONTAINERS=1
      - NETWORKS=1
      - SERVICES=1
      - EVENTS=1
    networks:
      - bw-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: "50m"

  # ---------------------------------------------------------------------------
  # Telemt — network telemetry collector (metrics / SNMP / flow)
  # https://github.com/raylabpro/telemt
  # ---------------------------------------------------------------------------
  telemt:
    image: raylabpro/telemt:debian
    container_name: telemt
    profiles:
      - telemt
    environment:
      - RUST_LOG=${TELEMT_LOG:-info}
      - TZ=${TZ:-UTC}
    networks:
      - bw-net
    ports:
      # Default 18443 avoids conflict with bunkerweb on 443.
      # Change TELEMT_PORT in .env if you need 443 (only when bunkerweb profile is OFF).
      - "${TELEMT_PORT:-18443}:443"
      - "127.0.0.1:9090:9090"
      - "127.0.0.1:9091:9091"
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=16m
    ulimits:
      nofile:
        hard: 65536
        soft: 65536
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      # Volume mount for telemt config. The container is read_only, but Docker
      # bind mounts bypass that restriction — telemt can write new users here.
      # MUST contain config.toml before starting telemt. Copy the template:
      #   mkdir -p telemt-config && cp protocol_telemt/config.toml telemt-config/config.toml
      - ${TELEMT_CONFIG_DIR:-./telemt-config}:/etc/telemt/
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    healthcheck:
      # Telemt is a Rust binary — no Python/curl available in the minimal image.
      # Use pidof to check if the process is running.
      test: ["CMD-SHELL", "pidof telemt || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 10m
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

networks:
  bw-net:
    driver: bridge

volumes:
  bw-data:
